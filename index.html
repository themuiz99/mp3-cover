<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Cover Designer Pro V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #050505;
            color: #eeeeee;
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 1rem;
        }
        .custom-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 5px;
            outline: none;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
        }
        #finalOutput {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 1rem;
            cursor: pointer;
        }
        .control-btn {
            background: #1f1f1f;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .control-btn:active {
            background: #6366f1;
            transform: scale(0.9);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col items-center mb-8 gap-2 text-center">
            <h1 class="text-3xl font-bold text-indigo-500 tracking-tight">Music Cover Designer Pro</h1>
            <p class="text-neutral-500 text-sm">ออกแบบรูปภาพ 1000x1000 | แตะค้างที่รูปภาพเพื่อบันทึกจ้า</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- Left: Preview -->
            <div class="relative group">
                <div id="dropZone" class="relative aspect-square w-full bg-neutral-900 rounded-3xl overflow-hidden border-2 border-dashed border-neutral-800 hover:border-indigo-500 transition-all flex items-center justify-center cursor-pointer">
                    <img id="finalOutput" class="hidden shadow-2xl shadow-black" alt="Music Cover Preview">
                    
                    <div id="uploadPrompt" class="flex flex-col items-center text-neutral-500">
                        <div class="bg-neutral-800 p-8 rounded-full mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/><line x1="16" x2="22" y1="5" y2="5"/><line x1="19" x2="19" y1="2" y2="8"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                        </div>
                        <p class="text-xl font-bold">แตะเพื่อเลือกรูปภาพ</p>
                    </div>

                    <button id="changeImgBtn" class="hidden absolute top-4 right-4 bg-black/80 hover:bg-indigo-600 p-3 rounded-full text-white backdrop-blur-md border border-white/10 z-20 transition-all shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                </div>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <canvas id="hiddenCanvas" class="hidden"></canvas>
            </div>

            <!-- Right: Tools Area -->
            <div class="space-y-6 bg-neutral-900/60 p-6 md:p-8 rounded-3xl border border-neutral-800 backdrop-blur-xl h-fit">
                <!-- Text Area -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-indigo-400 font-bold uppercase tracking-widest text-xs flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
                            ข้อความบนปก
                        </h3>
                        <button id="addTextBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-lg flex items-center gap-1 text-xs font-bold transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                            เพิ่มข้อความ
                        </button>
                    </div>

                    <!-- Input 1 -->
                    <div class="space-y-2">
                        <input type="text" id="text1Input" placeholder="ข้อความหลัก..." class="w-full bg-neutral-800/50 border border-neutral-700 rounded-xl py-4 px-6 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-lg">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                                <label class="text-[10px] text-neutral-500 block mb-1">ขนาดข้อความหลัก</label>
                                <input type="range" id="size1Range" min="20" max="600" value="333" class="custom-slider">
                            </div>
                            <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                                <label class="text-[10px] text-neutral-500 block mb-1">ตำแหน่งบน-ล่าง</label>
                                <input type="range" id="y1Range" min="0" max="1000" value="800" class="custom-slider">
                            </div>
                        </div>
                    </div>

                    <!-- Input 2 (Hidden Initially) -->
                    <div id="text2Container" class="hidden space-y-3 pt-4 border-t border-neutral-800">
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-neutral-400 font-bold">ข้อความที่ 2</span>
                            <button id="removeText2Btn" class="text-red-400 hover:text-red-300 text-[10px] uppercase font-bold">ลบออก</button>
                        </div>
                        <input type="text" id="text2Input" placeholder="ข้อความเสริม..." class="w-full bg-neutral-800/50 border border-neutral-700 rounded-xl py-3 px-5 focus:ring-2 focus:ring-pink-500 outline-none transition-all text-lg">
                        
                        <div class="flex flex-wrap items-center gap-4 bg-black/30 p-4 rounded-2xl border border-white/5">
                            <!-- Directional Pad for Text 2 -->
                            <div class="grid grid-cols-3 gap-1">
                                <div></div>
                                <button class="control-btn" id="t2Up"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg></button>
                                <div></div>
                                <button class="control-btn" id="t2Left"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
                                <button class="control-btn" id="t2Down"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>
                                <button class="control-btn" id="t2Right"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
                            </div>
                            <!-- Size Controls for Text 2 -->
                            <div class="flex-1 space-y-2">
                                <label class="text-[10px] text-neutral-500 block">ขนาดข้อความที่ 2: <span id="size2Label" class="text-indigo-400">100</span></label>
                                <div class="flex items-center gap-2">
                                    <button class="control-btn flex-1 py-2 font-bold" id="t2Small">-</button>
                                    <button class="control-btn flex-1 py-2 font-bold" id="t2Big">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <hr class="border-neutral-800">

                <!-- Image Controls -->
                <div class="space-y-4">
                    <h3 class="text-indigo-400 font-bold uppercase tracking-widest text-[10px] flex items-center gap-2">เครื่องมือรูปภาพ</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                            <label class="text-[10px] text-neutral-500 block mb-1">ซูมภาพ</label>
                            <input type="range" id="scaleRange" min="0.5" max="3" step="0.01" value="1" class="custom-slider">
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                            <label class="text-[10px] text-neutral-500 block mb-1">ความสว่าง</label>
                            <input type="range" id="brightnessRange" min="0" max="150" value="90" class="custom-slider">
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                            <label class="text-[10px] text-neutral-500 block mb-1">เลื่อนรูป (ซ้าย-ขวา)</label>
                            <input type="range" id="offXRange" min="-1000" max="1000" value="0" class="custom-slider">
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                            <label class="text-[10px] text-neutral-500 block mb-1">เลื่อนรูป (บน-ล่าง)</label>
                            <input type="range" id="offYRange" min="-1000" max="1000" value="0" class="custom-slider">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const finalOutput = document.getElementById('finalOutput');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const changeImgBtn = document.getElementById('changeImgBtn');

        // Text 1 Controls
        const text1Input = document.getElementById('text1Input');
        const size1Range = document.getElementById('size1Range');
        const y1Range = document.getElementById('y1Range');

        // Text 2 UI
        const addTextBtn = document.getElementById('addTextBtn');
        const text2Container = document.getElementById('text2Container');
        const removeText2Btn = document.getElementById('removeText2Btn');
        const text2Input = document.getElementById('text2Input');
        const size2Label = document.getElementById('size2Label');

        // Text 2 States
        let isText2Active = false;
        let t2X = 500;
        let t2Y = 200;
        let t2Size = 100;

        // Image Controls
        const scaleRange = document.getElementById('scaleRange');
        const brightnessRange = document.getElementById('brightnessRange');
        const offXRange = document.getElementById('offXRange');
        const offYRange = document.getElementById('offYRange');

        let uploadedImage = null;

        canvas.width = 1000;
        canvas.height = 1000;

        function render() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 1000, 1000);

            if (uploadedImage) {
                ctx.save();
                ctx.filter = `brightness(${brightnessRange.value}%)`;
                
                const scale = parseFloat(scaleRange.value);
                const imgAspect = uploadedImage.width / uploadedImage.height;
                let drawW, drawH;

                if (imgAspect > 1) {
                    drawH = 1000 * scale;
                    drawW = drawH * imgAspect;
                } else {
                    drawW = 1000 * scale;
                    drawH = drawW / imgAspect;
                }

                const xPos = (1000 - drawW) / 2 + parseInt(offXRange.value);
                const yPos = (1000 - drawH) / 2 + parseInt(offYRange.value);
                ctx.drawImage(uploadedImage, xPos, yPos, drawW, drawH);
                ctx.restore();
            }

            // Draw Text 1
            if (text1Input.value) {
                drawText(text1Input.value, 500, parseInt(y1Range.value), parseInt(size1Range.value));
            }

            // Draw Text 2
            if (isText2Active && text2Input.value) {
                drawText(text2Input.value, t2X, t2Y, t2Size);
            }

            finalOutput.src = canvas.toDataURL('image/jpeg', 0.9);
        }

        function drawText(text, x, y, size) {
            ctx.save();
            ctx.font = `italic bold ${size}px "Sarabun", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Stroke
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = size * 0.12;
            ctx.lineJoin = 'round';
            ctx.strokeText(text, x, y);

            // Fill
            ctx.fillStyle = '#ffffff';
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        // Add/Remove Text 2
        addTextBtn.onclick = () => {
            isText2Active = true;
            text2Container.classList.remove('hidden');
            addTextBtn.classList.add('hidden');
            render();
        };

        removeText2Btn.onclick = () => {
            isText2Active = false;
            text2Container.classList.add('hidden');
            addTextBtn.classList.remove('hidden');
            render();
        };

        // Text 2 Controls
        document.getElementById('t2Up').onclick = () => { t2Y -= 15; render(); };
        document.getElementById('t2Down').onclick = () => { t2Y += 15; render(); };
        document.getElementById('t2Left').onclick = () => { t2X -= 15; render(); };
        document.getElementById('t2Right').onclick = () => { t2X += 15; render(); };
        document.getElementById('t2Big').onclick = () => { t2Size += 5; size2Label.innerText = t2Size; render(); };
        document.getElementById('t2Small').onclick = () => { t2Size -= 5; size2Label.innerText = t2Size; render(); };

        // File handling
        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    uploadedImage = img;
                    finalOutput.classList.remove('hidden');
                    uploadPrompt.classList.add('hidden');
                    changeImgBtn.classList.remove('hidden');
                    render();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        dropZone.onclick = () => !uploadedImage && fileInput.click();
        changeImgBtn.onclick = (e) => { e.stopPropagation(); fileInput.click(); };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        // General Updates
        [text1Input, text2Input, size1Range, y1Range, scaleRange, brightnessRange, offXRange, offYRange].forEach(input => {
            input.oninput = render;
        });

        render();
    </script>
</body>
</html>
